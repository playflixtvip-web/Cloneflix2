<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX PRO - PAINEL CLOUD</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #141414; --red: #E50914; --card: #222; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* LOGIN */
        #login-container { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .login-box { background: rgba(20, 20, 20, 0.95); padding: 40px; border-radius: 8px; width: 90%; max-width: 360px; text-align: center; border: 1px solid #333; }
        .login-box h2 { color: var(--red); margin-bottom: 25px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; border: none; background: #333; color: #fff; box-sizing: border-box; }
        .btn-red { width: 100%; padding: 12px; background: var(--red); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-red:hover { background: #b20710; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: #000; display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #333; }
        header h1 { color: var(--red); font-size: 1.4rem; margin: 0; }
        .nav-btns { display: flex; gap: 10px; }

        /* PLAYER */
        #player-area { position: relative; width: 100%; background: #000; margin-top: 60px; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; display: block; }

        /* CONTEÚDO */
        .container { padding: 20px; }
        .section-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; border-left: 5px solid var(--red); padding-left: 10px; color: var(--red); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .card { background: var(--card); border-radius: 6px; overflow: hidden; cursor: pointer; position: relative; transition: 0.3s; border: 2px solid transparent; }
        .card:hover { border-color: var(--red); transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .card-name { padding: 8px; font-size: 0.75rem; font-weight: bold; text-align: center; background: rgba(0,0,0,0.8); position: absolute; bottom: 0; width: 100%; box-sizing: border-box; }

        /* PAINEL ADMIN */
        #admin-panel { display: none; padding: 80px 20px; min-height: 100vh; background: #111; }
        .admin-section { background: #1c1c1c; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333; }
        .admin-section h3 { margin-top: 0; color: var(--red); border-bottom: 1px solid #333; padding-bottom: 10px; }
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #262626; margin-bottom: 8px; border-radius: 4px; }
        .btn-del { background: #ff3333; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <h2>CLONEFLIX</h2>
            <input type="text" id="user-login" placeholder="Usuário">
            <input type="password" id="pass-login" placeholder="Senha">
            <button class="btn-red" onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="main-app" style="display:none">
        <header>
            <h1>CLONEFLIX</h1>
            <div class="nav-btns">
                <button id="btn-adm-view" class="btn-red" style="display:none; background:#444" onclick="abrirAdmin()">PAINEL</button>
                <button id="btn-back" class="btn-red" onclick="irParaHome()" style="display:none; width:auto;">VOLTAR</button>
            </div>
        </header>

        <div id="player-area"><video id="main-video" controls autoplay playsinline></video></div>

        <div class="container">
            <div id="titulo-dinamico" class="section-title">Categorias</div>
            <div id="grid-home" class="grid"></div>
            <div id="grid-itens" class="grid" style="display:none"></div>
        </div>
    </div>

    <div id="admin-panel">
        <button class="btn-red" onclick="fecharAdmin()" style="width:auto; margin-bottom:20px">← VOLTAR AO APP</button>
        
        <div class="admin-section">
            <h3>Gerenciar Usuários</h3>
            <input type="text" id="adm-user-name" placeholder="Nome do Usuário">
            <input type="text" id="adm-user-pass" placeholder="Senha de Acesso">
            <button class="btn-red" onclick="salvarUsuario()">CRIAR ACESSO ONLINE</button>
            <div id="lista-usuarios-cloud" style="margin-top:20px"></div>
        </div>

        <div class="admin-section">
            <h3>Adicionar Filme ou Canal</h3>
            <input type="text" id="f-nome" placeholder="Nome do Conteúdo">
            <input type="text" id="f-cat" placeholder="Categoria (Ex: FILMES, CANAIS, SERIES)">
            <input type="text" id="f-url" placeholder="URL do Conteúdo (.m3u8)">
            <input type="text" id="f-capa" placeholder="URL da Capa (Imagem)">
            <button class="btn-red" onclick="salvarConteudo()">PUBLICAR PARA TODOS</button>
        </div>
    </div>

<script>
    // --- CONFIGURAÇÃO DO SEU FIREBASE (DADOS ATUALIZADOS) ---
    const firebaseConfig = {
        apiKey: "AIzaSyBOGGCL_TYyNahux59JIa7k6Y-IyVz4ggo",
        authDomain: "cloneflix-16f9c.firebaseapp.com",
        databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com",
        projectId: "cloneflix-16f9c",
        storageBucket: "cloneflix-16f9c.firebasestorage.app",
        messagingSenderId: "424547428500",
        appId: "1:424547428500:web:df36775fea37db3d42ac31"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let dadosGlobais = {};

    // --- SISTEMA DE LOGIN ---
    function fazerLogin() {
        const u = document.getElementById('user-login').value;
        const p = document.getElementById('pass-login').value;

        // Login do Dono (Rhuan)
        if (u === "Rhuan" && p === "2026") {
            iniciarApp({user: "Rhuan", isAdmin: true});
            return;
        }

        // Busca usuários no Banco de Dados Online
        database.ref('usuarios').once('value', (snap) => {
            let userFound = null;
            snap.forEach(child => {
                if(child.val().user === u && child.val().pass === p) userFound = child.val();
            });

            if(userFound) iniciarApp(userFound);
            else alert("Acesso negado! Verifique usuário e senha.");
        });
    }

    function iniciarApp(dados) {
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        if(dados.isAdmin) document.getElementById('btn-adm-view').style.display = 'block';
        
        ouvirDadosCloud();
    }

    // --- SINCRONIZAÇÃO EM TEMPO REAL ---
    function ouvirDadosCloud() {
        database.ref('conteudo').on('value', (snap) => {
            dadosGlobais = {};
            snap.forEach(item => {
                const c = item.val();
                const cat = (c.categoria || "OUTROS").toUpperCase();
                if(!dadosGlobais[cat]) dadosGlobais[cat] = [];
                dadosGlobais[cat].push(c);
            });
            irParaHome();
        });
    }

    // --- NAVEGAÇÃO ---
    function irParaHome() {
        document.getElementById('grid-home').style.display = 'grid';
        document.getElementById('grid-itens').style.display = 'none';
        document.getElementById('btn-back').style.display = 'none';
        document.getElementById('titulo-dinamico').innerText = "Categorias";
        
        const grid = document.getElementById('grid-home');
        grid.innerHTML = "";
        
        Object.keys(dadosGlobais).sort().forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.height = '100px';
            card.style.display = 'flex';
            card.style.alignItems = 'center';
            card.style.justifyContent = 'center';
            card.innerHTML = `<strong>${cat}</strong>`;
            card.onclick = () => abrirCategoria(cat);
            grid.appendChild(card);
        });
    }

    function abrirCategoria(cat) {
        document.getElementById('grid-home').style.display = 'none';
        document.getElementById('grid-itens').style.display = 'grid';
        document.getElementById('btn-back').style.display = 'block';
        document.getElementById('titulo-dinamico').innerText = cat;
        
        const grid = document.getElementById('grid-itens');
        grid.innerHTML = "";
        
        dadosGlobais[cat].forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => play(item.url);
            card.innerHTML = `<img src="${item.capa}" onerror="this.src='https://via.placeholder.com/150x220?text=Sem+Imagem'">
                              <div class="card-name">${item.nome}</div>`;
            grid.appendChild(card);
        });
    }

    function play(url) {
        if(!url) return alert("Erro na URL do conteúdo!");
        const v = document.getElementById('main-video');
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
            hls.on(Hls.Events.MANIFEST_PARSED, () => v.play());
        } else {
            v.src = url;
            v.play();
        }
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // --- FUNÇÕES EXCLUSIVAS DO DONO (RHUAN) ---
    function salvarUsuario() {
        const u = document.getElementById('adm-user-name').value;
        const p = document.getElementById('adm-user-pass').value;
        if(u && p) {
            database.ref('usuarios').push({ user: u, pass: p, isAdmin: false });
            alert("Novo usuário criado na nuvem!");
            document.getElementById('adm-user-name').value = "";
            document.getElementById('adm-user-pass').value = "";
            renderizarUsuariosAdmin();
        }
    }

    function renderizarUsuariosAdmin() {
        database.ref('usuarios').once('value', snap => {
            const div = document.getElementById('lista-usuarios-cloud');
            div.innerHTML = "<h4>Usuários Ativos:</h4>";
            snap.forEach(child => {
                div.innerHTML += `<div class="user-item">
                                    <span>${child.val().user}</span>
                                    <button class="btn-del" onclick="deletarUsuario('${child.key}')">DELETAR</button>
                                  </div>`;
            });
        });
    }

    function deletarUsuario(key) {
        if(confirm("Deseja remover este acesso?")) {
            database.ref('usuarios/' + key).remove().then(() => renderizarUsuariosAdmin());
        }
    }

    function salvarConteudo() {
        const payload = {
            nome: document.getElementById('f-nome').value,
            categoria: document.getElementById('f-cat').value || "GERAL",
            url: document.getElementById('f-url').value,
            capa: document.getElementById('f-capa').value
        };
        
        if(payload.nome && payload.url) {
            database.ref('conteudo').push(payload).then(() => {
                alert("Conteúdo sincronizado para todos!");
                document.querySelectorAll('#admin-panel input').forEach(i => i.value = "");
            });
        }
    }

    function abrirAdmin() { 
        document.getElementById('main-app').style.display='none'; 
        document.getElementById('admin-panel').style.display='block'; 
        renderizarUsuariosAdmin();
    }
    function fecharAdmin() { 
        document.getElementById('admin-panel').style.display='none'; 
        document.getElementById('main-app').style.display='block'; 
    }
</script>
</body>
</html>
