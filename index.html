<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLONEFLIX VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0b0b0b; --red: #E50914; --card: #141414; --text: #fff; --gray: #2a2a2a; }
        body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.95); display: flex; align-items: center; padding: 0 15px; z-index: 1000; justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid #222; }
        .btn-red { padding: 12px; background: var(--red); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: var(--gray); color: #fff; box-sizing: border-box; }
        
        #main-content { display: none; padding-top: 60px; }
        #player-area { width: 100%; aspect-ratio: 16/9; background: #000; position: sticky; top: 60px; z-index: 900; display: none; border-bottom: 2px solid var(--red); }
        video { width: 100%; height: 100%; }

        .category-item { background: #1a1a1a; padding: 18px; margin: 8px 15px; border-radius: 8px; cursor: pointer; border-left: 5px solid var(--red); font-weight: bold; display: flex; justify-content: space-between; }
        #detalhe-categoria { display: none; padding: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px, 1fr)); gap: 12px; }
        .card { background: var(--card); border-radius: 6px; overflow: hidden; border: 1px solid #222; text-align: center; position: relative; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
        .badge-info { position: absolute; top: 5px; right: 5px; background: var(--red); color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; font-weight: bold; }

        /* MODAIS DE NAVEGAÇÃO */
        .modal-folder { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 25px; overflow-y: auto; }
        .folder-item { background: #222; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--red); cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; }

        /* PAINEL ADM */
        #admin-panel { display: none; padding: 80px 15px 40px; background: #000; min-height: 100vh; }
        .admin-box { background: #141414; padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; }
        .tabela-container { overflow-x: auto; background: #0c0c0c; border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        td, th { padding: 12px; border-bottom: 1px solid #1a1a1a; text-align: left; }
        .btn-mini { padding: 5px 8px; border-radius: 4px; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-container" style="position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999;">
        <div style="text-align:center; background:#141414; padding:35px; border-radius:15px; border:1px solid #333; width:85%; max-width:340px;">
            <h1 style="color:var(--red); margin-bottom: 30px; font-size: 28px;">CLONEFLIX</h1>
            <input type="text" id="u-l" placeholder="Usuário">
            <input type="password" id="p-l" placeholder="Senha">
            <button class="btn-red" id="b-e" style="width:100%">ENTRAR</button>
        </div>
    </div>

    <div id="main-content">
        <header>
            <h2 style="color:var(--red); margin:0;">CLONEFLIX</h2>
            <div style="display: flex; gap: 8px;">
                <button id="b-a" class="btn-red" style="display:none; padding: 8px 12px;">ADM</button>
                <button class="btn-red" style="background:#333" onclick="location.reload()">SAIR</button>
            </div>
        </header>
        <div id="player-area"><video id="main-video" controls playsinline></video></div>
        <div id="user-info" style="padding:15px; font-size:12px; color:#aaa; background:#111;">
            <b>VALE ATÉ:</b> <span id="txt-validade" style="color:var(--red)">---</span>
        </div>
        <div id="lista-categorias"></div>
        <div id="detalhe-categoria">
            <button class="btn-red" id="btn-voltar-cat" style="width:100%; margin-bottom:20px; background:#222;">← VOLTAR AOS GRUPOS</button>
            <h3 id="nome-cat-titulo" style="border-left: 4px solid var(--red); padding-left: 12px;"></h3>
            <div class="grid" id="grid-conteudo"></div>
        </div>
    </div>

    <div id="modal-temp" class="modal-folder">
        <h2 id="m-serie-nome" style="color:var(--red); margin-top:0;"></h2>
        <div id="lista-temp-itens"></div>
        <button class="btn-red" onclick="fecharModais()" style="width:100%; margin-top:20px; background:#333">VOLTAR</button>
    </div>

    <div id="modal-epis" class="modal-folder" style="z-index: 2001;">
        <h2 id="m-temp-nome" style="color:var(--red); margin-top:0;"></h2>
        <div id="lista-epis-itens"></div>
        <button class="btn-red" onclick="document.getElementById('modal-epis').style.display='none'" style="width:100%; margin-top:20px; background:#333">VOLTAR PARA TEMPORADAS</button>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content: space-between; margin-bottom: 25px;">
            <button class="btn-red" id="b-v-adm" style="background:#333">← VOLTAR AO APP</button>
            <button class="btn-red" onclick="location.reload()">LOGOUT</button>
        </div>

        <div class="admin-box">
            <h3>Adicionar Filme ou Temporada</h3>
            <p style="font-size: 10px; color: #888;">Para episódios, cole os links um embaixo do outro no campo URL.</p>
            <input type="hidden" id="edit-cont-id">
            <input id="c-n" placeholder="Nome (Ex: Grey's Anatomy - T1)">
            <input id="c-c" placeholder="Categoria (Ex: SÉRIES)">
            <textarea id="c-u" placeholder="URL do Conteúdo (Se for série, cole um link por linha)" rows="4"></textarea>
            <input id="c-p" placeholder="URL da Capa">
            <button class="btn-red" id="btn-salvar-manual" style="width:100%">SALVAR NO BANCO</button>
        </div>

        <div class="admin-box">
            <h3>Clientes</h3>
            <div style="display:flex; flex-wrap:wrap; gap:5px;">
                <input type="hidden" id="edit-user-id">
                <input id="a-u" placeholder="Usuário" style="flex:1">
                <input id="a-p" placeholder="Senha" style="flex:1">
                <input id="a-d" type="number" placeholder="Dias" style="width:60px">
                <button id="b-c-u" class="btn-red" style="width:100%">CRIAR ACESSO</button>
            </div>
            <div class="tabela-container"><table><thead><tr><th>NOME</th><th>VAL</th><th>ST</th></tr></thead><tbody id="l-u"></tbody></table></div>
        </div>

        <div class="admin-box">
            <h3>Conteúdos</h3>
            <div class="tabela-container"><table><thead><tr><th>NOME</th><th>GRUPO</th><th>AÇÃO</th></tr></thead><tbody id="l-c"></tbody></table></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBGOGCL_TYyNrhuxS9jIa7k8Y-IyVr4ggo", databaseURL: "https://cloneflix-16f9c-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        let dadosGerais = [];
        const video = document.getElementById('main-video');

        // LOGIN (Simplificado)
        document.getElementById('b-e').onclick = async () => {
            const user = document.getElementById('u-l').value;
            const pass = document.getElementById('p-l').value;
            if(user === "Rhuan" && pass === "2026") return logado(true, "ADMIN");
            const snap = await get(ref(db, 'usuarios'));
            let v = null;
            snap.forEach(i => { if(i.val().user === user && i.val().pass === pass) v = i.val(); });
            if(v && v.status === 'ativo') logado(false, "ATIVO");
            else alert("Acesso negado ou expirado!");
        };

        function logado(adm, val) {
            document.getElementById('login-container').style.display='none';
            document.getElementById('main-content').style.display='block';
            document.getElementById('txt-validade').innerText = val;
            if(adm) document.getElementById('b-a').style.display='block';
            carregar();
        }

        function carregar() {
            onValue(ref(db, 'conteudo'), (s) => {
                dadosGerais = []; const tabC = document.getElementById('l-c'); tabC.innerHTML = "";
                s.forEach(i => {
                    const d = i.val(); const k = i.key; dadosGerais.push({...d, k});
                    tabC.innerHTML += `<tr><td>${d.nome}</td><td>${d.categoria}</td><td><button class="btn-mini" style="background:#007bff" onclick="window.editC('${k}')">ED</button></td></tr>`;
                });
                renderCategorias();
            });
            onValue(ref(db, 'usuarios'), (s) => {
                const tabU = document.getElementById('l-u'); tabU.innerHTML = "";
                s.forEach(i => { tabU.innerHTML += `<tr><td>${i.val().user}</td><td>OK</td><td><button class="btn-mini" style="background:red" onclick="window.delU('${i.key}')">X</button></td></tr>`; });
            });
        }

        function renderCategorias() {
            const lista = document.getElementById('lista-categorias'); lista.innerHTML = "";
            const cats = [...new Set(dadosGerais.map(d => d.categoria))].sort();
            cats.forEach(cat => {
                const div = document.createElement('div'); div.className = 'category-item'; div.innerHTML = `<span>${cat}</span> <span>❯</span>`;
                div.onclick = () => abrirCategoria(cat);
                lista.appendChild(div);
            });
        }

        function abrirCategoria(cat) {
            document.getElementById('lista-categorias').style.display='none';
            document.getElementById('detalhe-categoria').style.display='block';
            document.getElementById('nome-cat-titulo').innerText = cat;
            const grid = document.getElementById('grid-conteudo'); grid.innerHTML = "";
            
            const itens = dadosGerais.filter(d => d.categoria === cat);
            const agrupados = {};
            itens.forEach(it => {
                const nomeSerie = it.nome.split(/ - T| T\d| Temp/i)[0].trim();
                if(!agrupados[nomeSerie]) agrupados[nomeSerie] = [];
                agrupados[nomeSerie].push(it);
            });

            Object.keys(agrupados).forEach(nome => {
                const temps = agrupados[nome];
                const card = document.createElement('div'); card.className = 'card';
                card.innerHTML = `<img src="${temps[0].capa}"><div style="font-size:10px; padding:8px;">${nome}</div>
                ${temps.length > 1 || temps[0].url.includes('\n') ? `<span class="badge-info">SÉRIE</span>` : ''}`;
                card.onclick = () => abrirTemporadas(nome, temps);
                grid.appendChild(card);
            });
        }

        function abrirTemporadas(nome, temps) {
            document.getElementById('modal-temp').style.display = 'block';
            document.getElementById('m-serie-nome').innerText = nome;
            const container = document.getElementById('lista-temp-itens'); container.innerHTML = "";
            temps.forEach(t => {
                const d = document.createElement('div'); d.className = 'folder-item';
                d.innerHTML = `<span>${t.nome.replace(nome + " - ", "")}</span> <span>❯</span>`;
                d.onclick = () => abrirEpisodios(t.nome, t.url);
                container.appendChild(d);
            });
        }

        function abrirEpisodios(nomeTemp, urls) {
            const listaLinks = urls.split(/\r?\n/).filter(l => l.trim() !== "");
            if(listaLinks.length <= 1 && !urls.includes('\n')) return darPlay(urls);

            document.getElementById('modal-epis').style.display = 'block';
            document.getElementById('m-temp-nome').innerText = nomeTemp;
            const container = document.getElementById('lista-epis-itens'); container.innerHTML = "";
            listaLinks.forEach((link, index) => {
                const d = document.createElement('div'); d.className = 'folder-item';
                d.innerHTML = `<span>Episódio ${index + 1}</span> <span>▶</span>`;
                d.onclick = () => { darPlay(link); fecharModais(); };
                container.appendChild(d);
            });
        }

        window.fecharModais = () => {
            document.getElementById('modal-temp').style.display = 'none';
            document.getElementById('modal-epis').style.display = 'none';
        };

        function darPlay(url) {
            document.getElementById('player-area').style.display = 'block';
            if(Hls.isSupported()){
                const hls = new Hls(); hls.loadSource(url.trim()); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
            }
            window.scrollTo(0,0);
        }

        document.getElementById('btn-salvar-manual').onclick = () => {
            const obj = { nome: document.getElementById('c-n').value, categoria: document.getElementById('c-c').value.toUpperCase(), url: document.getElementById('c-u').value, capa: document.getElementById('c-p').value };
            push(ref(db, 'conteudo'), obj).then(() => { alert("Salvo!"); location.reload(); });
        };

        document.getElementById('btn-voltar-cat').onclick = () => {
            video.pause(); document.getElementById('player-area').style.display = 'none';
            document.getElementById('detalhe-categoria').style.display='none';
            document.getElementById('lista-categorias').style.display='block';
        };

        document.getElementById('b-a').onclick = () => { document.getElementById('main-content').style.display='none'; document.getElementById('admin-panel').style.display='block'; };
        document.getElementById('b-v-adm').onclick = () => { document.getElementById('admin-panel').style.display='none'; document.getElementById('main-content').style.display='block'; };
    </script>
</body>
</html>
